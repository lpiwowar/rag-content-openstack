name: "Build and push rag-content container image"

on:
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

  schedule:
    - cron: '15 02 * * *'

env:
  IMAGE_NAME: quay.io/openstack-lightspeed/${{ github.event.repository.name }}

jobs:
  build-and-push-rag-content:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          # This might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB.
          tool-cache: true

      - name: Log in to registry.redhat.io
        uses: redhat-actions/podman-login@v1
        with:
          username: ${{ secrets.REDHAT_REGISTRY_LOGIN }}
          password: ${{ secrets.REDHAT_REGISTRY_PASSWORD }}
          registry: registry.redhat.io
